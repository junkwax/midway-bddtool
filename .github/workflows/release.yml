name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
          - platform: macos-arm64
            os: macos-latest
          - platform: macos-x86_64
            os: macos-15-intel

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must look like v1.0.2 or v1.0.2.0" >&2
            exit 1
          fi

          echo "BDDVIEW_RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev zip

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sdl2

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBDDVIEW_RELEASE_VERSION="${BDDVIEW_RELEASE_VERSION}"

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          platform="${{ matrix.platform }}"
          package="midway-bddtool-${GITHUB_REF_NAME}-${platform}"
          root="dist/${package}"
          mkdir -p "${root}/bin"

          cp build/bddview "${root}/bin/"
          cp build/bddtool "${root}/bin/"
          cp README.md CHANGELOG.md "${root}/"
          if [ -d build/assets ]; then
            cp -R build/assets "${root}/bin/"
          fi
          chmod +x "${root}/bin/bddview" "${root}/bin/bddtool"

          if [ "${RUNNER_OS}" = "macOS" ]; then
            mkdir -p "${root}/Frameworks"
            sdl_lib="$(brew --prefix sdl2)/lib/libSDL2-2.0.0.dylib"
            cp "${sdl_lib}" "${root}/Frameworks/"
            chmod +w "${root}/bin/bddview" "${root}/Frameworks/libSDL2-2.0.0.dylib"
            install_name_tool -id "@rpath/libSDL2-2.0.0.dylib" "${root}/Frameworks/libSDL2-2.0.0.dylib"
            linked_sdl="$(otool -L "${root}/bin/bddview" | awk '/libSDL2-2.0.0.dylib/{print $1; exit}')"
            if [ -n "${linked_sdl}" ]; then
              install_name_tool -change "${linked_sdl}" "@rpath/libSDL2-2.0.0.dylib" "${root}/bin/bddview"
            fi
          fi

          smoke="${RUNNER_TEMP}/checker"
          "${root}/bin/bddview" --write-checker-test "${smoke}"
          "${root}/bin/bddview" --check-open-mode "${smoke}.BDB"
          "${root}/bin/bddtool" validate "${smoke}.BDB" "${smoke}.BDD"

          (cd dist && zip -r "${package}.zip" "${package}")

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/*.zip
          if-no-files-found: error

  source:
    name: Package source
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Package source archive
        shell: bash
        run: |
          set -euo pipefail

          package="midway-bddtool-${GITHUB_REF_NAME}-source"
          mkdir -p dist
          git archive --format=zip --prefix="${package}/" -o "dist/${package}.zip" "${GITHUB_SHA}"

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - build
      - source
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/*.zip --clobber
          else
            gh release create "${TAG_NAME}" release-assets/*.zip \
              --title "midway-bddtool ${TAG_NAME}" \
              --generate-notes \
              --verify-tag
          fi

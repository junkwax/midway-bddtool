name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
          - platform: macos-arm64
            os: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sdl2

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Smoke test (headless CLI)
        shell: bash
        run: |
          set -euo pipefail
          smoke="${RUNNER_TEMP}/checker"
          ./build/bddview --write-checker-test "${smoke}"
          ./build/bddview --check-open-mode "${smoke}.BDB"
          ./build/bddtool validate "${smoke}.BDB" "${smoke}.BDD"

      - name: Smoke test (round-trip)
        run: python3 tools/roundtrip_smoke.py
